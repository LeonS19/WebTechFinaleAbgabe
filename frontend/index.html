<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-App</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- PWA: Manifest einbinden -->
    <link rel="manifest" href="./manifest.json">

    <!-- PWA: Service Worker registrieren -->
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log('[SW] Service Worker registriert'))
        .catch(err => console.error('[SW] Fehler:', err));
    }
    </script>
</head>
<body>

    <main>
        <h1>Meine Todos</h1>

        <!-- Formular zum Erstellen neuer Todos -->
        <form id="new-todo-form">
            <input 
                type="text" 
                id="todo-title-input" 
                placeholder="Was muss erledigt werden?" 
                required 
            />
            <input 
                type="number" 
                id="todo-priority-input" 
                placeholder="Priorität (1-3)" 
                min="1" 
                max="3" 
                required 
            />
            <!-- NEU: Textarea für die Beschreibung -->
            <textarea 
                id="todo-description-input" 
                placeholder="Beschreibung (optional)"
            ></textarea>
            <!-- NEU: Datums-Input für das Fälligkeitsdatum -->
            <input 
                type="date" 
                id="todo-duedate-input"
            />
            <button type="submit">Hinzufügen</button>
        </form>

        <!-- NEU: Filter- und Sortier-Steuerelemente -->
        <div id="filter-controls">
            <!--suchen Zeile-->
            <input type="search" id="search-input" placeholder="Suchen...">

            <!--Filter-Dropdown-Menü-->
            <select id="filter-select">
                <option value="all">Alle anzeigen</option>
                <option value="completed-false">Nur offene</option>
                <option value="completed-true">Nur erledigte</option>
                <option value="priority-1">Priorität 1</option>
                <option value="priority-2">Priorität 2</option>
                <option value="priority-3">Priorität 3</option>
            </select>

            <!--Sortier-Dropdown-Menü-->
            <select id="sort-select">
                <option value="" disabled selected>Sortieren nach...</option>
                <option value="priority-desc">Priorität (Absteigend)</option>
                <option value="priority-asc">Priorität (Aufsteigend)</option>
                <option value="dueDate-asc">Fälligkeitsdatum</option>
            </select>
        </div>

        <!-- Hier werden die Todos per JavaScript eingefügt -->
        <ul id="todo-list"></ul>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <script src="js/db.js"></script>
    <script src="js/components/todo-card.js"></script>
    <script src="js/components/chat-window.js"></script>
    <script src="js/components/attachment-list.js"></script>
    <script src="js/script.js"></script>
</body>
</body>
</html>
