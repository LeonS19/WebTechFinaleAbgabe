<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <h1>Meine Todos</h1>

        <!-- Formular zum Erstellen neuer Todos -->
        <form id="new-todo-form">
            <input 
                type="text" 
                id="todo-title-input" 
                placeholder="Was muss erledigt werden?" 
                required 
            />
            <input 
                type="number" 
                id="todo-priority-input" 
                placeholder="Priorität (1-3)" 
                min="1" 
                max="3" 
                required 
            />
            <!-- NEU: Textarea für die Beschreibung -->
            <textarea 
                id="todo-description-input" 
                placeholder="Beschreibung (optional)"
            ></textarea>
            <!-- NEU: Datums-Input für das Fälligkeitsdatum -->
            <input 
                type="date" 
                id="todo-duedate-input"
            />
            <button type="submit">Hinzufügen</button>
        </form>

        <!-- NEU: Filter- und Sortier-Steuerelemente -->
        <div id="filter-controls">
            <input type="search" id="search-input" placeholder="Suchen...">
            <select id="sort-select">
                <option value="">Sortieren nach...</option>
                <option value="priority-desc">Priorität (Absteigend)</option>
                <option value="priority-asc">Priorität (Aufsteigend)</option>
                <option value="dueDate-asc">Fälligkeitsdatum</option>
            </select>
        </div>

        <!-- Hier werden die Todos per JavaScript eingefügt -->
        <ul id="todo-list">
            <!-- Beispiel-Struktur, die wir mit JS erzeugen werden:
            <li class="todo-item">
                <div class="todo-details">
                    <h3>Titel des Todos (Prio: 3)</h3>
                    <p>Beschreibung des Todos...</p>
                    <small>Fällig am: 2026-12-24</small>
                </div>
                <div class="todo-actions">
                    <button class="complete-btn">Erledigt</button>
                    <button class="delete-btn">Löschen</button>
                </div>
            </li>
            -->
        </ul>
    </main>

    <script src="script.js"></script>
</body>
</html>
