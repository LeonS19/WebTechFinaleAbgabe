openapi: 3.0.3
info:
  title: Learning Platform API
  description: REST-API für die kollaborative Lernplattform mit RPG-Gameplay. Die Kern-Datenoperationen laufen über GraphQL — diese REST-API deckt Authentifizierung, Datei-Handling und Infrastruktur-Endpunkte ab.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api/v1
    description: Lokaler Entwicklungsserver

# ============================================
# SECURITY SCHEMES
# ============================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        mimeType:
          type: string
        sizeInBytes:
          type: integer
        uploadedAt:
          type: string
          format: date-time
        uploadedBy:
          type: string
          format: uuid

    PasskeyRegistrationOptions:
      type: object
      properties:
        challenge:
          type: string
        rp:
          type: object
          properties:
            name:
              type: string
            id:
              type: string
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            displayName:
              type: string
        pubKeyCredParams:
          type: array
          items:
            type: object

    PasskeyAuthenticationOptions:
      type: object
      properties:
        challenge:
          type: string
        allowCredentials:
          type: array
          items:
            type: object
        timeout:
          type: integer

# ============================================
# PATHS
# ============================================
paths:

  # ------------------------------------------
  # SWAGGER UI
  # ------------------------------------------
  /docs:
    get:
      summary: Swagger UI
      description: Interaktive API-Dokumentation. Wird über swagger-ui-express unter http://localhost:3000/api/docs bereitgestellt.
      tags: [Infrastructure]
      responses:
        '200':
          description: Swagger UI HTML-Seite
          content:
            text/html:
              schema:
                type: string

  # ------------------------------------------
  # HEALTH
  # ------------------------------------------
  /health:
    get:
      summary: Health Check
      description: Gibt den Service-Status zurück. Wird von Docker und Monitoring-Tools genutzt.
      tags: [Infrastructure]
      responses:
        '200':
          description: Service ist gesund
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  postgres:
                    type: string
                    example: connected
                  mongodb:
                    type: string
                    example: connected

  # ------------------------------------------
  # OAUTH - Google
  # ------------------------------------------
  /auth/google:
    get:
      summary: Google OAuth Login starten
      description: Leitet den Nutzer zum Google OAuth Consent Screen weiter.
      tags: [Authentication]
      responses:
        '302':
          description: Weiterleitung zu Google OAuth

  /auth/google/callback:
    get:
      summary: Google OAuth Callback
      description: |
        Google leitet nach erfolgreichem Login hierhin weiter.
        Der Server tauscht den Code gegen Google-Tokens, findet oder erstellt den User
        und leitet den Browser mit einem kurzlebigen Einmal-Code als Query-Parameter
        zum Frontend weiter (NICHT das JWT selbst).
        Beispiel-Redirect: `http://localhost:5173/auth/callback?code=3f9a...`
        Das Frontend liest den Code aus der URL und tauscht ihn über
        POST /auth/exchange gegen ein JWT. Der Code ist 60 Sekunden gültig
        und kann nur einmal verwendet werden.
      tags: [Authentication]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization Code von Google
      responses:
        '302':
          description: Weiterleitung zum Frontend mit einem Einmal-Code als Query-Parameter (?code=...)
        '302 (error)':
          description: Weiterleitung zur Fehlerseite des Frontends (?message=...), falls der OAuth-Login fehlgeschlagen ist

  /auth/exchange:
    post:
      summary: Einmal-Code gegen ein JWT eintauschen
      description: |
        Tauscht den kurzlebigen Einmal-Code, der über den Redirect von
        `/auth/google/callback` empfangen wurde, gegen das eigentliche JWT.
        Der Code ist 60 Sekunden gültig und wird nach diesem Aufruf sofort
        ungültig — unabhängig davon, ob er erfolgreich eingelöst wurde oder nicht
        (Replay-Schutz). Dadurch landet das JWT selbst nie in der URL,
        der Browser-History oder in Server-Logs.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Der Einmal-Code aus dem Query-Parameter des OAuth-Callback-Redirects
              required: [code]
      responses:
        '200':
          description: Code gültig — gibt das JWT zurück
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Code fehlt, ist ungültig, abgelaufen oder bereits verwendet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # PASSKEY - User anlegen / finden
  # ------------------------------------------
  /auth/passkey/user:
    post:
      summary: User für Passkey-Registrierung finden oder anlegen
      description: |
        Sucht einen bestehenden User anhand der Email oder legt einen neuen an.
        Vor der Registrierung eines Passkeys aufrufen, um die userId zu erhalten.
        Ermöglicht eine benutzernamenlose Passkey-Registrierung, ohne zuvor
        Google OAuth zu benötigen.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: test@example.com
                name:
                  type: string
                  example: Max Mustermann
                  description: Optional — Standardwert ist die Email, falls nicht angegeben
              required: [email]
      responses:
        '200':
          description: User gefunden oder angelegt — gibt userId zurück
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
        '400':
          description: Erforderliche Felder fehlen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # PASSKEY - Registration
  # ------------------------------------------
  /auth/passkey/register/options:
    post:
      summary: Optionen für die Passkey-Registrierung abrufen
      description: Gibt WebAuthn-Registrierungsoptionen zurück (Challenge, RP-Infos, User-Infos). Vor der Registrierung eines neuen Passkeys auf einem Gerät aufrufen. Liefert sowohl die WebAuthn-Optionen (für den Browser) als auch eine challengeId (die beim Verify-Call mitgeschickt werden muss).
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  format: uuid
                  example: 11782402-754c-48e5-a26a-65906d7c1557
                userEmail:
                  type: string
                  format: email
                  example: test@example.com
              required: [userId, userEmail]
      responses:
        '200':
          description: Registrierungsoptionen + challengeId
          content:
            application/json:
              schema:
                type: object
                properties:
                  options:
                    $ref: '#/components/schemas/PasskeyRegistrationOptions'
                  challengeId:
                    type: string
                    format: uuid
        '400':
          description: Erforderliche Felder fehlen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/passkey/register/verify:
    post:
      summary: Passkey-Registrierung verifizieren und speichern
      description: Verifiziert die WebAuthn-Registrierungsantwort des Geräts und speichert den Passkey. Die von der options-Route erhaltene challengeId zusammen mit der Credential-Response des Browsers senden.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                challengeId:
                  type: string
                  format: uuid
                  description: Die von register/options erhaltene challengeId
                response:
                  type: object
                  description: WebAuthn Credential-Response von navigator.credentials.create() über @simplewebauthn/browser
                userId:
                  type: string
                  format: uuid
                deviceName:
                  type: string
                  example: Chrome Virtual Authenticator
                  description: Optional — Standardwert ist 'Unbekanntes Gerät', falls nicht angegeben
              required: [challengeId, response, userId]
      responses:
        '200':
          description: Passkey erfolgreich registriert — gibt Passkey-Daten und JWT zurück
          content:
            application/json:
              schema:
                type: object
                properties:
                  passkey:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      userId:
                        type: string
                        format: uuid
                      credentialId:
                        type: string
                      deviceName:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                  token:
                    type: string
                    description: JWT — für nachfolgende Requests speichern und verwenden
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Verifizierung fehlgeschlagen oder Felder fehlen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # PASSKEY - Login
  # ------------------------------------------
  /auth/passkey/login/options:
    post:
      summary: Optionen für die Passkey-Authentifizierung abrufen
      description: Gibt WebAuthn-Authentifizierungsoptionen für einen benutzernamenlosen Login zurück. Kein Request-Body nötig — der Browser findet verfügbare Passkeys automatisch. Liefert sowohl Optionen (für den Browser) als auch eine challengeId (die beim Verify-Call mitgeschickt werden muss).
      tags: [Authentication]
      responses:
        '200':
          description: Authentifizierungsoptionen + challengeId
          content:
            application/json:
              schema:
                type: object
                properties:
                  options:
                    $ref: '#/components/schemas/PasskeyAuthenticationOptions'
                  challengeId:
                    type: string
                    format: uuid

  /auth/passkey/login/verify:
    post:
      summary: Passkey-Login verifizieren
      description: Verifiziert die WebAuthn-Authentifizierungsantwort, aktualisiert den Passkey-Counter und gibt ein JWT zurück. Die von der login/options-Route erhaltene challengeId zusammen mit der Credential-Response des Browsers senden.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                challengeId:
                  type: string
                  format: uuid
                  description: Die von login/options erhaltene challengeId
                response:
                  type: object
                  description: WebAuthn Credential-Response von navigator.credentials.get() über @simplewebauthn/browser
              required: [challengeId, response]
      responses:
        '200':
          description: Login erfolgreich — gibt das JWT direkt als String zurück
          content:
            application/json:
              schema:
                type: string
                example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Verifizierung fehlgeschlagen oder Felder fehlen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # PASSKEY - Management
  # ------------------------------------------
  /auth/passkey/{id}:
    delete:
      summary: Passkey entfernen
      description: Entfernt einen registrierten Passkey vom Account des Users. Nur der Besitzer des Passkeys kann ihn löschen (verifiziert über das JWT).
      tags: [Authentication]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Die Passkey-ID (nicht die credential_id, sondern die interne Datenbank-UUID)
      responses:
        '204':
          description: Passkey erfolgreich entfernt (kein Inhalt)
        '400':
          description: Passkey nicht gefunden oder nicht berechtigt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — JWT fehlt oder ist ungültig
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # FILE UPLOAD
  # ------------------------------------------
  /index-cards/{cardId}/attachments:
    post:
      summary: Dateianhang zu einer Karteikarte hochladen
      description: Lädt eine Datei hoch und hängt sie an die angegebene Karteikarte an. Nur Mitglieder der Lerngruppe der Karte dürfen hochladen.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        '201':
          description: Datei erfolgreich hochgeladen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '403':
          description: Kein Mitglied dieser Lerngruppe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Datei zu groß
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: Anhänge einer Karteikarte auflisten
      description: Gibt alle Anhänge einer angegebenen Karteikarte zurück. Nur für Mitglieder der Lerngruppe der Karte zugänglich.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste der Anhänge
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
        '403':
          description: Kein Mitglied dieser Lerngruppe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # FILE DOWNLOAD
  # ------------------------------------------
  /index-cards/{cardId}/attachments/{attachmentId}:
    get:
      summary: Dateianhang herunterladen
      description: Lädt einen bestimmten Dateianhang herunter. Nur für Mitglieder der Lerngruppe der Karte zugänglich.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dateiinhalt
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          description: Kein Mitglied dieser Lerngruppe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Anhang nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Dateianhang löschen
      description: Löscht einen Dateianhang. Nur der Uploader oder ein Gruppen-Admin dürfen löschen.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Anhang gelöscht
        '403':
          description: Nicht berechtigt, diesen Anhang zu löschen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Anhang nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'