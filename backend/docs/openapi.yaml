openapi: 3.0.3
info:
  title: Learning Platform API
  description: REST API for the collaborative learning platform with RPG gameplay. Core data operations run via GraphQL — this REST API covers authentication, file handling, and infrastructure endpoints.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server

# ============================================
# SECURITY SCHEMES
# ============================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        mimeType:
          type: string
        sizeInBytes:
          type: integer
        uploadedAt:
          type: string
          format: date-time
        uploadedBy:
          type: string
          format: uuid

    PasskeyRegistrationOptions:
      type: object
      properties:
        challenge:
          type: string
        rp:
          type: object
          properties:
            name:
              type: string
            id:
              type: string
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            displayName:
              type: string
        pubKeyCredParams:
          type: array
          items:
            type: object

    PasskeyAuthenticationOptions:
      type: object
      properties:
        challenge:
          type: string
        allowCredentials:
          type: array
          items:
            type: object
        timeout:
          type: integer

# ============================================
# PATHS
# ============================================
paths:

  # ------------------------------------------
  # SWAGGER UI
  # ------------------------------------------
  /docs:
    get:
      summary: Swagger UI
      description: Interactive API documentation. Served via swagger-ui-express at http://localhost:3000/api/docs
      tags: [Infrastructure]
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string

  # ------------------------------------------
  # HEALTH
  # ------------------------------------------
  /health:
    get:
      summary: Health check
      description: Returns service status. Used by Docker and monitoring tools.
      tags: [Infrastructure]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  postgres:
                    type: string
                    example: connected
                  mongodb:
                    type: string
                    example: connected

  # ------------------------------------------
  # OAUTH - Google
  # ------------------------------------------
  /auth/google:
    get:
      summary: Initiate Google OAuth login
      description: Redirects the user to Google's OAuth consent screen.
      tags: [Authentication]
      responses:
        '302':
          description: Redirect to Google OAuth

  /auth/google/callback:
    get:
      summary: Google OAuth callback
      description: Google redirects here after successful login. Returns a JWT token.
      tags: [Authentication]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: OAuth failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # PASSKEY - Registration
  # ------------------------------------------
  /auth/passkey/register/options:
    post:
      summary: Get passkey registration options
      description: Returns WebAuthn registration options (challenge, rp info, user info). Call this before registering a new passkey on a device.
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deviceName:
                  type: string
                  example: MacBook Pro
              required: [deviceName]
      responses:
        '200':
          description: Registration options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyRegistrationOptions'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/passkey/register/verify:
    post:
      summary: Verify and save passkey registration
      description: Verifies the WebAuthn registration response from the device and saves the passkey.
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                credential:
                  type: object
                  description: WebAuthn credential response from navigator.credentials.create()
                deviceName:
                  type: string
              required: [credential, deviceName]
      responses:
        '201':
          description: Passkey registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  deviceName:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
        '400':
          description: Verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # PASSKEY - Login
  # ------------------------------------------
  /auth/passkey/login/options:
    post:
      summary: Get passkey authentication options
      description: Returns WebAuthn authentication options (challenge, allowed credentials). Call this to initiate a passkey login.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: Optional — narrows down which passkeys to offer
      responses:
        '200':
          description: Authentication options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAuthenticationOptions'

  /auth/passkey/login/verify:
    post:
      summary: Verify passkey login
      description: Verifies the WebAuthn authentication response, updates the passkey counter, and returns a JWT token.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                credential:
                  type: object
                  description: WebAuthn credential response from navigator.credentials.get()
              required: [credential]
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # PASSKEY - Management
  # ------------------------------------------
  /auth/passkey/{passkeyId}:
    delete:
      summary: Remove a passkey
      description: Removes a registered passkey from the user's account. Requires at least one remaining login method.
      tags: [Authentication]
      security:
        - bearerAuth: []
      parameters:
        - name: passkeyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Passkey removed
        '400':
          description: Cannot remove last login method
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Passkey not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # FILE UPLOAD
  # ------------------------------------------
  /index-cards/{cardId}/attachments:
    post:
      summary: Upload a file attachment to an index card
      description: Uploads a file and attaches it to the given index card. Only members of the card's study group can upload.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        '201':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '403':
          description: Not a member of this study group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: List attachments of an index card
      description: Returns all attachments for a given index card. Only accessible to members of the card's study group.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
        '403':
          description: Not a member of this study group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # FILE DOWNLOAD
  # ------------------------------------------
  /index-cards/{cardId}/attachments/{attachmentId}:
    get:
      summary: Download a file attachment
      description: Downloads a specific file attachment. Only accessible to members of the card's study group.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          description: Not a member of this study group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Attachment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a file attachment
      description: Deletes a file attachment. Only the uploader or a group admin can delete.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Attachment deleted
        '403':
          description: Not authorized to delete this attachment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Attachment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
