openapi: 3.0.3
info:
  title: Learning Platform API
  description: REST API for the collaborative learning platform with RPG gameplay. Core data operations run via GraphQL — this REST API covers authentication, file handling, and infrastructure endpoints.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server

# ============================================
# SECURITY SCHEMES
# ============================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        mimeType:
          type: string
        sizeInBytes:
          type: integer
        uploadedAt:
          type: string
          format: date-time
        uploadedBy:
          type: string
          format: uuid

    PasskeyRegistrationOptions:
      type: object
      properties:
        challenge:
          type: string
        rp:
          type: object
          properties:
            name:
              type: string
            id:
              type: string
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            displayName:
              type: string
        pubKeyCredParams:
          type: array
          items:
            type: object

    PasskeyAuthenticationOptions:
      type: object
      properties:
        challenge:
          type: string
        allowCredentials:
          type: array
          items:
            type: object
        timeout:
          type: integer

# ============================================
# PATHS
# ============================================
paths:

  # ------------------------------------------
  # SWAGGER UI
  # ------------------------------------------
  /docs:
    get:
      summary: Swagger UI
      description: Interactive API documentation. Served via swagger-ui-express at http://localhost:3000/api/docs
      tags: [Infrastructure]
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string

  # ------------------------------------------
  # HEALTH
  # ------------------------------------------
  /health:
    get:
      summary: Health check
      description: Returns service status. Used by Docker and monitoring tools.
      tags: [Infrastructure]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  postgres:
                    type: string
                    example: connected
                  mongodb:
                    type: string
                    example: connected

  # ------------------------------------------
  # OAUTH - Google
  # ------------------------------------------
  /auth/google:
    get:
      summary: Initiate Google OAuth login
      description: Redirects the user to Google's OAuth consent screen.
      tags: [Authentication]
      responses:
        '302':
          description: Redirect to Google OAuth

  /auth/google/callback:
    get:
      summary: Google OAuth callback
      description: |
        Google redirects here after successful login.
        The server exchanges the code for tokens, finds or creates the user,
        and redirects the browser to the frontend with a JWT token as a query parameter.
        Example redirect: `http://localhost:5173/auth/callback?token=eyJ...`
        The frontend reads the token from the URL and stores it for subsequent requests.
      tags: [Authentication]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from Google
      responses:
        '302':
          description: Redirect to frontend with JWT token as query parameter (?token=...)
        '302 (error)':
          description: Redirect to frontend error page (?message=...) if OAuth failed

  # ------------------------------------------
  # PASSKEY - User anlegen / finden
  # ------------------------------------------
  /auth/passkey/user:
    post:
      summary: Find or create user for passkey registration
      description: |
        Finds an existing user by email or creates a new one.
        Call this before registering a passkey to get the userId.
        This enables usernameless passkey registration without requiring Google OAuth first.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: test@example.com
                name:
                  type: string
                  example: Max Mustermann
                  description: Optional — defaults to email if not provided
              required: [email]
      responses:
        '200':
          description: User found or created — returns userId
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # PASSKEY - Registration
  # ------------------------------------------
  /auth/passkey/register/options:
    post:
      summary: Get passkey registration options
      description: Returns WebAuthn registration options (challenge, rp info, user info). Call this before registering a new passkey on a device. Returns both the WebAuthn options (for the browser) and a challengeId (to be sent back with the verify call).
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  format: uuid
                  example: 11782402-754c-48e5-a26a-65906d7c1557
                userEmail:
                  type: string
                  format: email
                  example: test@example.com
              required: [userId, userEmail]
      responses:
        '200':
          description: Registration options + challengeId
          content:
            application/json:
              schema:
                type: object
                properties:
                  options:
                    $ref: '#/components/schemas/PasskeyRegistrationOptions'
                  challengeId:
                    type: string
                    format: uuid
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/passkey/register/verify:
    post:
      summary: Verify and save passkey registration
      description: Verifies the WebAuthn registration response from the device and saves the passkey. Send the challengeId received from the options call along with the browser's credential response.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                challengeId:
                  type: string
                  format: uuid
                  description: The challengeId received from the register/options call
                response:
                  type: object
                  description: WebAuthn credential response from navigator.credentials.create() via @simplewebauthn/browser
                userId:
                  type: string
                  format: uuid
                deviceName:
                  type: string
                  example: Chrome Virtual Authenticator
                  description: Optional — defaults to 'Unbekanntes Gerät' if not provided
              required: [challengeId, response, userId]
      responses:
        '200':
          description: Passkey registered successfully — returns passkey data and JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  passkey:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      userId:
                        type: string
                        format: uuid
                      credentialId:
                        type: string
                      deviceName:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                  token:
                    type: string
                    description: JWT token — store and use for subsequent requests
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Verification failed or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # PASSKEY - Login
  # ------------------------------------------
  /auth/passkey/login/options:
    post:
      summary: Get passkey authentication options
      description: Returns WebAuthn authentication options for usernameless login. No request body needed — the browser discovers available passkeys automatically. Returns both options (for the browser) and a challengeId (to be sent back with the verify call).
      tags: [Authentication]
      responses:
        '200':
          description: Authentication options + challengeId
          content:
            application/json:
              schema:
                type: object
                properties:
                  options:
                    $ref: '#/components/schemas/PasskeyAuthenticationOptions'
                  challengeId:
                    type: string
                    format: uuid

  /auth/passkey/login/verify:
    post:
      summary: Verify passkey login
      description: Verifies the WebAuthn authentication response, updates the passkey counter, and returns a JWT token. Send the challengeId received from the login/options call along with the browser's credential response.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                challengeId:
                  type: string
                  format: uuid
                  description: The challengeId received from the login/options call
                response:
                  type: object
                  description: WebAuthn credential response from navigator.credentials.get() via @simplewebauthn/browser
              required: [challengeId, response]
      responses:
        '200':
          description: Login successful — returns JWT token string directly
          content:
            application/json:
              schema:
                type: string
                example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Verification failed or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # PASSKEY - Management
  # ------------------------------------------
  /auth/passkey/{id}:
    delete:
      summary: Remove a passkey
      description: Removes a registered passkey from the user's account. Only the owner of the passkey can delete it (verified via JWT token).
      tags: [Authentication]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The passkey ID (not the credential_id, but the internal database UUID)
      responses:
        '204':
          description: Passkey removed successfully (no content)
        '400':
          description: Passkey not found or not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # FILE UPLOAD
  # ------------------------------------------
  /index-cards/{cardId}/attachments:
    post:
      summary: Upload a file attachment to an index card
      description: Uploads a file and attaches it to the given index card. Only members of the card's study group can upload.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        '201':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '403':
          description: Not a member of this study group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: List attachments of an index card
      description: Returns all attachments for a given index card. Only accessible to members of the card's study group.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
        '403':
          description: Not a member of this study group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ------------------------------------------
  # FILE DOWNLOAD
  # ------------------------------------------
  /index-cards/{cardId}/attachments/{attachmentId}:
    get:
      summary: Download a file attachment
      description: Downloads a specific file attachment. Only accessible to members of the card's study group.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          description: Not a member of this study group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Attachment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a file attachment
      description: Deletes a file attachment. Only the uploader or a group admin can delete.
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Attachment deleted
        '403':
          description: Not authorized to delete this attachment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Attachment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'