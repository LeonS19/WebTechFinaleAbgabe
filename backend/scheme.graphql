type Todo {
  id: ID!
  title: String!
  status: TodoStatus!
  priority: Priority!
  dueDate: String
  tags: [String]
  comments: [Comment]
  checklistItems: [ChecklistItem]
  history: [HistoryEntry]
  createdAt: String!
  updatedAt: String!
}

type Comment {
  id: ID!
  text: String!
  author: String
  createdAt: String!
}

type ChecklistItem {
  id: ID!
  label: String!
  description: String
  checked: Boolean!
}

type HistoryEntry {
  changedAt: String!
  field: String!
  oldValue: String
  newValue: String
}

enum TodoStatus {
  OPEN
  IN_PROGRESS
  DONE
}

enum Priority {
  LOW
  MEDIUM
  HIGH
}

type Query {
  todos(status: TodoStatus, tag: String, priority: Priority): [Todo!]!
  todo(id: ID!): Todo
}

type Mutation {
  createTodo(input: CreateTodoInput!): Todo!
  updateTodo(id: ID!, input: UpdateTodoInput!): Todo!
  deleteTodo(id: ID!): Boolean!
  addComment(todoId: ID!, text: String!, author: String): Todo!
  addChecklistItem(todoId: ID!, label: String!, description: String): Todo!
  updateChecklistItem(todoId: ID!, itemId: ID!, label: String, description: String, checked: Boolean): Todo!
  deleteChecklistItem(todoId: ID!, itemId: ID!): Todo!
}

type Subscription {
  todoCreated: Todo!
  todoUpdated: Todo!
  todoDeleted: ID!
}

input CreateTodoInput {
  title: String!
  priority: Priority
  dueDate: String
  tags: [String]
}

input UpdateTodoInput {
  title: String
  status: TodoStatus
  priority: Priority
  dueDate: String
  tags: [String]
}
