# ============================================
# Learning Platform with RPG Gameplay
# GraphQL Schema
# ============================================


# ============================================
# ENUMS
# ============================================

enum Role {
    ADMIN
    MODERATOR
    MEMBER
}

enum FieldType {
    START
    NORMAL
    FIGHT
    BOSS
    HEAL
}

enum EnemyType {
    NORMAL
    BOSS
}


# ============================================
# TYPES
# ============================================

type User {
    id:         ID!
    name:       String!
    email:      String
    createdAt:  String!
}

type Membership {
    user:           User!
    studyGroup:     StudyGroup!
    role:           Role!
    joinedAt:       String!
}

type StudyGroup {
    id:         ID!
    name:       String!
    chatId:     ID!                 # references MongoDB chat document
    members:    [Membership!]!
    cards:      [IndexCard!]!
    createdAt:  String!
}

# ============================================
# INDEX CARDS
# ============================================

type Attachment {
    id:             ID!
    filename:       String!
    filePath:       String!
    mimeType:       String!
    sizeInBytes:    Int!
    uploadedAt:     String!
    uploadedBy:     User!
}

type GroupStat {
    studyGroupId:   ID!
    totalAttempts:  Int!
    correctAnswers: Int!
    difficulty:     Float!          # calculated: correctAnswers / totalAttempts
}

type UserStat {
    userId:         ID!
    totalAttempts:  Int!
    correctAnswers: Int!
    lastSeenAt:     String
}

type IndexCard {
    id:             ID!
    studyGroupId:   ID!
    creator:        User!
    question:       String!
    answer:         String!
    tags:           [String!]!
    attachments:    [Attachment!]!
    groupStats:     [GroupStat!]!
    userStats:      [UserStat!]!
    createdAt:      String!
    updatedAt:      String!
}

# ============================================
# MAP & FIELDS
# ============================================

type Enemy {
    id:             ID!
    name:           String!
    type:           EnemyType!
    baseHealth:     Int!
    baseDamage:     Int!
}

type Field {
    id:         ID!
    position:   Int!
    x:          Int!
    y:          Int!
    nextFields: [Int!]!
    type:       FieldType!
    enemies:    [Enemy!]!
}

type Map {
    id:     ID!
    name:   String!
    fields: [Field!]!
}

# ============================================
# RUN & COMBAT
# ============================================

type Player {
    level:          Int!
    maxHealth:      Int!
    currentHealth:  Int!
}

type Run {
    id:                 ID!
    user:               User!
    studyGroup:         StudyGroup!
    map:                Map!
    successful:         Boolean
    startTime:          String!
    duration:           Int
    correctAnswers:     Int!
    totalAnswers:       Int!
    hitRate:            Float
    currentPosition:    Int!
    player:             Player!
    deck:               [IndexCard!]!
    discardPile:        [IndexCard!]!
    activeCombat: Combat
}

type CombatEnemy {
    name:           String!
    type:           EnemyType!
    maxHealth:      Int!
    currentHealth:  Int!
    baseDamage:     Int!
}

type Combat {
    id:                 ID!
    enemy:              CombatEnemy!
    hand:               [IndexCard!]!
    isPlayerTurn:       Boolean!
    status:             String!
    deckCount: Int!
}

type MoveResult {
    run:    Run!
    combat: Combat
}

type AnswerResult {
    correct:        Boolean!
    damageDealt:    Int!
    correctAnswer:  String!
    combat:         Combat!
    player:         Player!
}

type EndTurnResult {
    combat: Combat!
    player: Player!
}

# ============================================
# CHAT
# ============================================

type Message {
    id:         ID!
    chatId:     ID!
    sender:     User!
    content:    String!
    sentAt:     String!
}

# ============================================
# RANKING
# ============================================

type RankingEntry {
    rank:               Int!
    user:               User!
    run:                Run!
    correctAnswers:     Int!           # primary sort criterion
    hitRate:            Float!         # secondary sort criterion
    duration:           Int!           # tertiary sort criterion
    isFormerMember:     Boolean!
}

# ============================================
# QUERIES
# ============================================

type Query {
    # Study Groups
    getStudyGroup(id: ID!): StudyGroup
    getStudyGroups(search: String): [StudyGroup!]!
    getMyStudyGroups: [StudyGroup!]!
    me: User!

    # Index Cards - supports filtering by tags and search term
    getIndexCards(
        studyGroupId:   ID!
        tags:           [String!]
        search:         String          # searches in question and answer
        creatorId:      ID              # filter by creator
    ): [IndexCard!]!
    getIndexCard(id: ID!): IndexCard

    # Messages
    getMessages(chatId: ID!, limit: Int, before: ID): [Message!]!

    # Ranking - only successful runs, sorted by correctAnswers DESC, then hitRate DESC, then duration ASC
    getRanking(studyGroupId: ID!): [RankingEntry!]!

    # Runs - full run history of a user
    getRuns: [Run!]!
    getActiveRun(studyGroupId: ID!): Run

    # Map - hardcoded single map with all fields
    getMap: Map
}

# ============================================
# MUTATIONS
# ============================================

type Mutation {
    # Study Groups
    createStudyGroup(name: String!): StudyGroup!
    joinStudyGroup(studyGroupId: ID!): Membership!
    leaveStudyGroup(studyGroupId: ID!): Boolean!
    removeMember(studyGroupId: ID!, userId: ID!): Boolean!

    # Index Cards
    createIndexCard(
        studyGroupId:   ID!
        question:       String!
        answer:         String!
        tags:           [String!]
    ): IndexCard!

    updateIndexCard(
        id:         ID!
        question:   String
        answer:     String
        tags:       [String!]
    ): IndexCard!

    deleteIndexCard(id: ID!): Boolean!

    # Run
    startRun(studyGroupId: ID!, selectedStartFieldPosition: Int!): Run!
    endRun(runId: ID!, successful: Boolean!): Run!
    moveToField(runId: ID!, targetPosition: Int!): MoveResult!

    # Combat - answer a card during a run
    # Backend compares userAnswer to card.answer (case-insensitive, trimmed)
    answerCard(
        runId:      ID!
        cardId:     ID!
        userAnswer: String!
    ): AnswerResult!
    endTurn(runId: ID!): EndTurnResult!

    # Chat
    sendMessage(
        chatId:     ID!
        content:    String!
    ): Message!
}

# ============================================
# SUBSCRIPTIONS
# ============================================

type Subscription {
    # New chat message in a group
    onNewMessage(chatId: ID!): Message!

    # Run state changes (position, hitRate, successful)
    onRunUpdated(runId: ID!): Run!

    # New index card created in a study group
    onIndexCardCreated(studyGroupId: ID!): IndexCard!

    # New Attachment for IndexCard
    onIndexCardUpdated(studyGroupId: ID!): IndexCard!

    onIndexCardDeleted(studyGroupId: ID!): ID!

    onRankingUpdated(studyGroupId: ID!): [RankingEntry!]!
}
